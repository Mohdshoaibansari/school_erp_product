# C-01 Casbin model — D11 tiered-delegation permission matrix (RBAC + ABAC).
#
# C-04 owns the Casbin framework; C-01 supplies the D11 matrix content and
# registers its own policies via the manifest `register_casbin_policies` hook
# (A5). This model combines:
#   - RBAC: role labels via `g` with a hierarchy (Platform Owner → lower roles).
#   - ABAC: subject/object attributes (client_id / institution_id) enforce the
#     own-client / own-institution / tenant-wide scope of D11.
#
# Request:  r = sub, obj, act        (sub/obj are attribute-bearing objects)
# Policy:   p = sub, obj, act, scope  (scope = any | tenant | institution)
# Roles:    g = _, _                   (name → role)
#
# Subject attributes: role, client_id, institution_id
# Object attributes:   name, client_id, institution_id
#
# scope semantics:
#   any        — no tenant check (Platform-level / cross-tenant operations)
#   tenant     — own-client:  sub.client_id == obj.client_id
#   institution— own-institution: sub.client_id == obj.client_id
#                             AND sub.institution_id == obj.institution_id

[request_definition]
r = sub, obj, act

[policy_definition]
p = sub, obj, act, scope

[role_definition]
g = _, _

[policy_effect]
e = some(where (p.eft == allow))

[matchers]
m = g(r.sub.role, p.sub) && (p.obj == "*" || p.obj == r.obj.name) && (p.act == "*" || p.act == r.act) && (p.scope == "any" || (p.scope == "tenant" && r.sub.client_id == r.obj.client_id) || (p.scope == "institution" && r.sub.client_id == r.obj.client_id && r.sub.institution_id == r.obj.institution_id))